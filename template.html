<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

<style>
body{
margin:0;
width:900px;
height:900px;
font-family:'Inter', system-ui, sans-serif;
position:relative;

background:
radial-gradient(circle at 20% 0%, rgba(168,85,247,0.35), transparent 40%),
radial-gradient(circle at 80% 20%, rgba(139,92,246,0.25), transparent 50%),
linear-gradient(160deg,#050508,#0b0515,#050508);

color:white;
}

/* HEADER */
.header{
position:absolute;
top:40px;
left:0;
width:100%;
display:flex;
flex-direction:column;
align-items:center;
}

/* TITLE */
.title{
max-width:760px;
width:100%;
padding:0 20px;

font-weight:900;
color:#c084fc;
letter-spacing:3px;

text-align:center;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;

text-shadow:0 0 20px rgba(168,85,247,0.5);

margin-bottom:10px;
}

/* TOURNAMENT */
.tournament{
font-size:22px;
font-weight:800;
color:#a855f7;
text-align:center;

text-shadow:0 0 10px rgba(168,85,247,0.6);
}

/* CENTER BLOCK */
.matchesArea{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%, -50%);

display:flex;
flex-direction:column;
align-items:center;
}

/* GRID */
.gridWrap{
width:760px;
}

.matches{
display:grid;
}

/* adaptive gaps */
.matches.gap-big{ gap:28px; }
.matches.gap-medium{ gap:20px; }
.matches.gap-small{ gap:14px; }

.matches.one{
grid-template-columns:1fr;
}

.matches.two{
grid-template-columns:1fr 1fr;
column-gap:24px;
}

/* MATCH */
.match{
display:flex;
align-items:center;
justify-content:space-between;
padding:16px 18px;
gap:12px;

background:rgba(168,85,247,0.08);
border:1px solid rgba(168,85,247,0.35);

border-radius:14px;

box-shadow:
0 0 20px rgba(168,85,247,0.25),
inset 0 0 20px rgba(168,85,247,0.12);
}

/* TEAM */
.team{
display:flex;
align-items:center;
gap:10px;
flex:1;
min-width:0;
}

.team.right{
justify-content:flex-end;
}

/* LOGO */
.logoBox{
width:42px;
height:42px;

display:flex;
align-items:center;
justify-content:center;

background:rgba(255,255,255,0.05);
border-radius:10px;

box-shadow:0 0 10px rgba(168,85,247,0.5);

flex-shrink:0;
}

.logoBox img{
max-width:28px;
max-height:28px;
}

/* NAME */
.name{
font-size:15px;
font-weight:800;

white-space:nowrap;
flex-shrink:0;
}

/* CENTER */
.center{
text-align:center;
flex:0 0 65px;
}

.time{
font-size:20px;
font-weight:900;
}

.bo{
font-size:11px;
opacity:0.7;
margin-top:2px;
}

/* 🔥 WATERMARK (оновлений під лінк як на прикладі) */
.watermark{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);

font-size:16px;
font-weight:900;
letter-spacing:1px;

color:rgba(255,255,255,0.85);

display:flex;
align-items:center;
gap:8px;
}

.tg-icon{
width:18px;

filter: brightness(0) invert(1)
drop-shadow(0 0 6px rgba(168,85,247,0.8));
}
</style>

</head>

<body>

<div class="header">

  <div class="title" style="font-size: {{TITLE_SIZE}}">
    {{TITLE}}
  </div>

  <div class="tournament">
    {{TOURNAMENT}}
  </div>

</div>

<div class="matchesArea">

  <div class="gridWrap">
    <div class="matches {{GRID_CLASS}}" id="matches">
      {{MATCHES}}
    </div>
  </div>

</div>

<div class="watermark">
  <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/telegram.svg" class="tg-icon">
  t.me/zbr4_cast
</div>

<script>
const matches = document.querySelectorAll(".match");
const container = document.getElementById("matches");

const count = matches.length;

container.classList.remove("gap-big","gap-medium","gap-small");

if(count <= 3){
  container.classList.add("gap-big");
}
else if(count <= 6){
  container.classList.add("gap-medium");
}
else{
  container.classList.add("gap-small");
}
</script>

</body>
</html>
