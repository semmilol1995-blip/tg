<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Matches</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
width:1000px;
height:1000px;
font-family:Montserrat,sans-serif;
background:radial-gradient(circle at top,#2a0f4a,#0b0616 70%);
color:white;
overflow:hidden;
position:relative;
}

/* HEADER */
.header{
position:absolute;
top:80px;
left:50%;
transform:translateX(-50%);
text-align:center;
width:760px;
}

.title{
font-weight:900;
color:#c084fc;
text-shadow:0 0 25px rgba(168,85,247,0.8);
line-height:1;
white-space:nowrap;
overflow:hidden;
}

/* авто розмір */
.title.small{ font-size:42px; }
.title.medium{ font-size:52px; }
.title.big{ font-size:64px; }

.subtitle{
margin-top:10px;
font-size:14px;
opacity:0.7;
letter-spacing:2px;
}

/* 🔥 ЦЕНТР БЛОК */
.matchesArea{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
display:flex;
flex-direction:column;
align-items:center;
}

/* 🔥 ТУРНІР (ПЕРЕНЕСЕНИЙ) */
.tournament{
width:760px;
margin-bottom:24px;
font-size:28px; /* трохи більший */
font-weight:900;
color:#c084fc;
text-align:center;
text-shadow:0 0 12px rgba(168,85,247,0.6);
}

/* GRID */
.gridWrap{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:20px;
width:760px;
}

/* MATCH */
.match{
display:flex;
align-items:center;
justify-content:space-between;
padding:18px 22px;
border-radius:20px;
background:rgba(168,85,247,0.08);
border:1px solid rgba(168,85,247,0.3);
box-shadow:
0 0 20px rgba(168,85,247,0.4),
inset 0 0 20px rgba(168,85,247,0.15);
}

/* TEAMS */
.team{
display:flex;
align-items:center;
gap:12px;
min-width:0;
}

.team.right{
justify-content:flex-end;
}

/* LOGO */
.logo{
width:42px;
height:42px;
border-radius:12px;
background:#1a1a1a;
object-fit:contain;
padding:6px;
}

/* NAME */
.name{
font-weight:700;
font-size:18px;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
max-width:120px;
}

/* CENTER */
.center{
text-align:center;
min-width:80px;
}

.score{
font-size:22px;
font-weight:900;
}

.time{
font-size:20px;
font-weight:900;
}

.bo{
font-size:12px;
opacity:0.7;
margin-top:2px;
}

/* WATERMARK */
.watermark{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
font-size:14px;
opacity:0.15;
letter-spacing:2px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="title" id="title">{{TITLE}}</div>
  <div class="subtitle">СМУГАСТИЙ | ZBR4 🇺🇦</div>
</div>

<!-- CENTER -->
<div class="matchesArea">

  <!-- 🔥 ТУРНІР ТУТ -->
  <div class="tournament">
    {{TOURNAMENT}}
  </div>

  <div class="gridWrap" id="matches"></div>

</div>

<div class="watermark">
  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-telegram" viewBox="0 0 16 16">
  <path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0M8.287 5.906q-1.168.486-4.667 2.01c-.502.214-.684.34-.707.447-.024.113.09.23.364.318l1.45.474.317 1.341a.8.8 0 0 0 .575.575l.136.036a.7.7 0 0 0 .343-.016l.169-.047 1.157-1.157 2.87 2.164c.264.198.482.193.655-.008l3.125-3.57c.175-.205.215-.38.136-.525l-.047-.087-3.518-6.32a.7.7 0 0 0-.343-.343l-.087-.047c-.145-.079-.32-.039-.525.136z"/>
</svg>

  t.me/zbr4_cast</div>

<script>

/* 🔥 АДАПТИВНИЙ ЗАГОЛОВОК */
const titleEl = document.getElementById("title");
const len = titleEl.innerText.length;

if(len < 15) titleEl.classList.add("big");
else if(len < 25) titleEl.classList.add("medium");
else titleEl.classList.add("small");

/* LOGOS */
const logos = {
  navi:"logos/navi.png",
  faze:"logos/faze.png",
  g2:"logos/g2.png",
  vitality:"logos/vitality.png",
  mouz:"logos/mouz.png",
  m80:"logos/m80.png"
};

function getLogo(team){
  return logos[team.toLowerCase()] || "logos/default.png";
}

/* DATA (бот підставляє) */
const matchesData = {{MATCHES}};

const container = document.getElementById("matches");

matchesData.forEach(m=>{
  container.innerHTML += `
  <div class="match">
    
    <div class="team">
      <img class="logo" src="${getLogo(m.t1)}">
      <div class="name">${m.t1.toUpperCase()}</div>
    </div>

    <div class="center">
      ${m.score 
        ? `<div class="score">${m.score}</div>` 
        : `<div class="time">${m.time}</div><div class="bo">${m.bo}</div>`
      }
    </div>

    <div class="team right">
      <div class="name">${m.t2.toUpperCase()}</div>
      <img class="logo" src="${getLogo(m.t2)}">
    </div>

  </div>
  `;
});

</script>

</body>
</html>
