<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
body{
margin:0;
width:900px;
height:900px;
font-family:Arial;
position:relative;

background:
radial-gradient(circle at 20% 0%, rgba(168,85,247,0.35), transparent 40%),
radial-gradient(circle at 80% 20%, rgba(139,92,246,0.25), transparent 50%),
linear-gradient(160deg,#050508,#0b0515,#050508);

color:white;
}

/* HEADER */
.header{
position:absolute;
top:40px;
left:0;
width:100%;
display:flex;
flex-direction:column;
align-items:center;
}

.title{
max-width:760px;
width:100%;
padding:0 20px;

font-weight:900;
color:#c084fc;
letter-spacing:3px;

text-align:center;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;

text-shadow:0 0 20px rgba(168,85,247,0.5);
}

.subtitle{
font-size:14px;
letter-spacing:2px;
margin-top:6px;
color:rgba(255,255,255,0.7);
}

/* CENTER */
.matchesArea{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%, -50%);
}

.gridWrap{
width:760px;
}

.matches{
display:grid;
gap:20px;
}

.matches.one{
grid-template-columns: 1fr;
}

.matches.two{
grid-template-columns: 1fr 1fr;
column-gap:24px;
row-gap:20px;
}

/* MATCH */
.match{
display:flex;
align-items:center;
justify-content:space-between;
padding:16px 18px;

background:rgba(168,85,247,0.08);
border:1px solid rgba(168,85,247,0.35);

border-radius:14px;

box-shadow:
0 0 20px rgba(168,85,247,0.25),
inset 0 0 20px rgba(168,85,247,0.12);
}

/* TEAM */
.team{
display:flex;
align-items:center;
gap:10px;

flex:1;
min-width:0;
}

.team.right{
justify-content:flex-end;
}

/* LOGO */
.logoBox{
width:42px;
height:42px;

display:flex;
align-items:center;
justify-content:center;

background:rgba(255,255,255,0.05);
border-radius:10px;

box-shadow:0 0 10px rgba(168,85,247,0.5);

flex-shrink:0;
}

.logoBox img{
max-width:28px;
max-height:28px;
}

/* NAME */
.name{
font-size:18px;
font-weight:800;

white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;

max-width:140px;
}

/* CENTER */
.center{
text-align:center;
flex:0 0 80px;
}

.time{
font-size:20px;
font-weight:900;
}

.bo{
font-size:11px;
opacity:0.7;
margin-top:2px;
}

/* WATERMARK */
.watermark{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
font-size:14px;
letter-spacing:2px;
color:rgba(255,255,255,0.25);
}
</style>

</head>

<body>

<div class="header">
  <div class="title" style="font-size: {{TITLE_SIZE}}">
    {{TITLE}}
  </div>
  <div class="subtitle">СМУГАСТИЙ | ZBR4</div>
</div>

<div class="matchesArea">
  <div class="gridWrap">
    <div class="matches {{GRID_CLASS}}">
      {{MATCHES}}
    </div>
  </div>
</div>

<div class="watermark">
t.me/zbr4_cast
</div>

</body>
</html>
