<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Telegram WebApp -->
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<link rel="stylesheet" href="style.css">

<title>🎁 Giveaway Panel</title>
</head>

<body>

<div class="app">

  <!-- HEADER -->
  <div class="header">
    <h2>🎁 Giveaway Panel</h2>
  </div>

  <!-- 🔥 NAVIGATION -->
  <div class="section">
    <button class="main-btn" onclick="location.href='giveaways.html'">
      📊 Перейти в розіграші
    </button>
  </div>

  <!-- CHANNELS -->
  <div class="section">
    <h3>📢 КАНАЛИ</h3>

    <!-- ADD CHANNEL -->
    <div class="add-channel">
      <input id="channelInput" placeholder="Вкажіть @channel або chat_id">
      <button class="add-btn" onclick="addChannel()">Додати</button>
    </div>

    <!-- CHANNEL LIST -->
    <div id="channels"></div>
  </div>

  <!-- CREATE -->
  <div class="section create">
    <h3>🚀 СТВОРИТИ РОЗІГРАШ</h3>

    <textarea id="text" placeholder="Текст розіграшу"></textarea>

    <input id="winners" type="number" placeholder="Кількість переможців">

<div class="date-row">

  <div class="input-wrap">
    <input id="date" type="date">
    <span class="fake-placeholder" data-for="date">Оберіть дату</span>
  </div>

  <div class="input-wrap">
    <input id="time" type="time">
    <span class="fake-placeholder" data-for="time">Оберіть час</span>
  </div>

</div>

    <input id="button" placeholder="Текст кнопки">

    <!-- IMAGE -->
    <label class="upload-btn">
      📷 Додати картинку
      <input type="file" id="image" name="image" accept="image/*">
    </label>

    <!-- PREVIEW IMAGE -->
    <img id="preview" class="preview">

    <!-- TELEGRAM PREVIEW -->
    <div id="previewPost" class="preview-post"></div>

    <!-- CREATE BUTTON -->
    <button class="main-btn" onclick="create()">🚀 Створити</button>
  </div>

</div>

<script src="app.js"></script>

</body>
</html>
