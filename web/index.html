<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<link rel="stylesheet" href="style.css">

<title>Giveaway Panel</title>
</head>

<body>

<div class="app">

<!-- HEADER -->
<div class="header">
  <h2>🎁 Giveaway Panel</h2>
</div>

<!-- GIVEAWAYS LIST -->
<div class="section">
  <h3>📊 Розіграші</h3>
  <div id="list">Завантаження...</div>
</div>

<!-- CHANNELS -->
<div class="section">
  <h3>📢 Канали</h3>

  <!-- 🔥 ADD CHANNEL -->
  <div class="add-channel">
    <input id="channelInput" placeholder="@channel або chat_id">
    <button onclick="addChannel()">➕</button>
  </div>

  <!-- CHANNEL LIST -->
  <div id="channels"></div>
</div>

<!-- CREATE -->
<div class="section create">
  <h3>🚀 Створити розіграш</h3>

  <textarea id="text" placeholder="Текст розіграшу"></textarea>

  <input id="winners" type="number" placeholder="Кількість переможців">

  <input id="date" type="datetime-local">

  <input id="button" placeholder="Текст кнопки">

  <!-- 🔥 IMAGE UPLOAD -->
  <label class="upload">
    📷 Додати картинку
    <input type="file" id="image" name="image" accept="image/*">
  </label>

  <!-- 🔥 IMAGE PREVIEW -->
  <img id="preview" class="preview">

  <!-- 🔥 TELEGRAM STYLE PREVIEW -->
  <div id="previewPost" class="preview-post"></div>

  <button class="main-btn" onclick="create()">🚀 Створити</button>
</div>

</div>

<script src="app.js"></script>

</body>
</html>
